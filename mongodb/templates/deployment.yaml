apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: ellamma-ecommerce
  labels:
    project: ecommerce-project
    component: mongodb
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      project: ecommerce-project
      component: mongodb
      tier: db
  template:
    metadata:
      labels:
        project: ecommerce-project
        component: mongodb
        tier: db
    spec:
      containers:
      - name: mongodb
        image: shankarntr/{{ .Values.deployment.image }}:{{ .Values.deployment.imageVersion }}
        imagePullPolicy: Always
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 5
          periodSeconds: 5

